name: Publish to NuGet and GitHub Releases

on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating tags and GitHub Releases
      packages: write # Required for publishing to GitHub Packages (NuGet)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GitVersion requires full history to calculate versions

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.0.0
        with:
          versionSpec: '6.x' # Use the latest 6.x version of GitVersion

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.0.0
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Target Framework is net10.0

      - name: Restore dependencies
        run: dotnet restore FmiSrl.FtpServer.Server/FmiSrl.FtpServer.Server.csproj

      - name: Build Project
        run: dotnet build FmiSrl.FtpServer.Server/FmiSrl.FtpServer.Server.csproj -c Release --no-restore -p:Version=${{ steps.gitversion.outputs.nuGetVersionV2 }} -p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} -p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} -p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}

      - name: Pack NuGet Package
        run: dotnet pack FmiSrl.FtpServer.Server/FmiSrl.FtpServer.Server.csproj -c Release --no-build -p:Version=${{ steps.gitversion.outputs.nuGetVersionV2 }} -o ./artifacts

      - name: Publish to GitHub Packages
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gitversion.outputs.semVer }} # Creates the tag from the GitVersion output
          name: Release ${{ steps.gitversion.outputs.semVer }}
          generate_release_notes: true # Uses commit history for the changelog
          prerelease: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }} # Marks as pre-release if on 'dev'
          files: ./artifacts/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NuGet.org
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
