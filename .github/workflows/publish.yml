name: Build, Test and Publish

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      checks: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install GitVersion
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.7.x'

      - name: Determine Version
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
        id: version_step
        uses: gittools/actions/gitversion/execute@v4.5.0
        with:
          configFilePath: GitVersion.yml
          disableCache: true
          updateProjectFiles: true

      - name: Restore dependencies
        run: dotnet restore FmiSrl.FtpServer.slnx

      - name: Build Solution
        run: dotnet build FmiSrl.FtpServer.slnx -c Release --no-restore

      - name: Run Tests
        run: dotnet test FmiSrl.FtpServer.slnx -c Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: "**/test-results.trx"
          reporter: dotnet-trx

      - name: Pack NuGet Package
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
        run: dotnet pack FmiSrl.FtpServer.Server/FmiSrl.FtpServer.Server.csproj -c Release --no-build -o ./artifacts

      - name: Generate Release Notes
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
        run: pwsh ./generate-release-notes.ps1

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version_step.outputs.GitVersion_FullSemVer }}
          name: Release ${{ steps.version_step.outputs.GitVersion_FullSemVer }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          prerelease: ${{ github.ref != 'refs/heads/master' }}
          files: ./artifacts/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate

      - name: Publish to NuGet.org
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
